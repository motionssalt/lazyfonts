# wrangler.toml — Cloudflare Worker configuration for LazyFonts.
#
# You do NOT need the Wrangler CLI to deploy this project. This file is
# checked in so the Cloudflare dashboard's Git integration can read it
# during builds. All bindings below can also be configured via the
# dashboard UI (Settings → Variables and Bindings) after the Worker is
# created — the values here just make it reproducible.

name = "lazyfonts"
main = "src/index.js"
compatibility_date = "2024-11-06"

# Node.js compatibility flag — JSZip touches a couple of Node built-ins
# (Buffer indirectly) that this flag polyfills for the Workers runtime.
compatibility_flags = ["nodejs_compat"]

# ─── KV namespace binding ────────────────────────────────────────────────────
# LAZYFONTS_KV holds per-chat session state (accumulated font bytes between
# messages). Create a KV namespace in the Cloudflare dashboard
# (Workers & Pages → KV → Create namespace, name it "lazyfonts-sessions"),
# then paste its ID below — OR bind it via the dashboard's
# Settings → Variables and Bindings → KV Namespace Bindings section
# (variable name: LAZYFONTS_KV) and delete this block entirely.
[[kv_namespaces]]
binding = "LAZYFONTS_KV"
id = "REPLACE_WITH_YOUR_KV_NAMESPACE_ID"

# ─── Secrets (do NOT commit real values) ─────────────────────────────────────
# Configure these in the dashboard under
# Settings → Variables and Bindings → Secrets:
#
#   TELEGRAM_BOT_TOKEN         (required)  from @BotFather
#   TELEGRAM_WEBHOOK_SECRET    (optional)  shared secret; if set, the Worker
#                                          only accepts webhook POSTs whose
#                                          X-Telegram-Bot-Api-Secret-Token
#                                          header matches this value.
